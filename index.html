<!DOCTYPE html>
<html lang="ja">
<head>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0a0f">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI Image Viewer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3e;
    --accent: #7c6af7;
    --accent2: #f06292;
    --accent3: #4dd0c4;
    --text: #e8e8f0;
    --text-dim: #7878a0;
    --text-bright: #ffffff;
    --success: #4dd0a0;
    --r: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    overflow-x: hidden;
  }

  /* ─── HEADER ─── */
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10,10,15,0.85);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 18px;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .logo span { font-weight: 400; opacity: 0.6; }
  .counter {
    font-size: 11px;
    color: var(--text-dim);
    background: var(--surface2);
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
  }

  /* ─── DROP ZONE ─── */
  #dropzone {
    margin: 20px 16px;
    border: 2px dashed var(--border);
    border-radius: var(--r);
    padding: 40px 20px;
    text-align: center;
    cursor: pointer;
    transition: all .25s;
    background: var(--surface);
    position: relative;
    overflow: hidden;
  }
  #dropzone::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 120%, rgba(124,106,247,.15) 0%, transparent 70%);
  }
  #dropzone.drag-over {
    border-color: var(--accent);
    background: rgba(124,106,247,.08);
  }
  #dropzone.hidden { display: none; }
  .drop-icon {
    font-size: 48px; margin-bottom: 14px;
    filter: drop-shadow(0 0 16px var(--accent));
  }
  .drop-title {
    font-family: 'Syne', sans-serif;
    font-size: 18px; font-weight: 700;
    color: var(--text-bright);
    margin-bottom: 8px;
  }
  .drop-sub { font-size: 12px; color: var(--text-dim); line-height: 1.6; }
  .drop-sub strong { color: var(--accent3); }
  .btn-upload-wrap {
    position: relative;
    display: inline-block;
    margin-top: 18px;
  }
  #fileInput {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
    cursor: pointer;
    font-size: 0;
    z-index: 10;
  }
  .btn-upload {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--accent);
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 14px;
    padding: 12px 24px;
    border-radius: 8px;
    border: none; cursor: pointer;
    transition: all .2s;
    box-shadow: 0 4px 20px rgba(124,106,247,.4);
    pointer-events: none;
  }
  .btn-upload-wrap:active .btn-upload { transform: scale(.96); }

  /* ─── TOOLBAR ─── */
  #toolbar {
    display: none;
    padding: 0 16px 12px;
    gap: 8px;
  }
  #toolbar.visible { display: flex; }
  .btn-sm {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    transition: all .2s;
  }
  .btn-sm:active { transform: scale(.95); }
  .btn-sm.active { border-color: var(--accent); color: var(--accent); }
  .btn-add {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-color: transparent;
    color: #fff;
    flex: none; padding: 10px 16px;
  }

  /* ─── GRID ─── */
  #gallery {
    padding: 0 16px 100px;
    columns: 2;
    column-gap: 10px;
  }
  #gallery.list-view { columns: 1; }

  /* ─── CARD ─── */
  .card {
    break-inside: avoid;
    margin-bottom: 10px;
    background: var(--surface);
    border-radius: var(--r);
    border: 1px solid var(--border);
    overflow: hidden;
    cursor: pointer;
    transition: transform .2s, box-shadow .2s;
    position: relative;
  }
  .card:active { transform: scale(.97); }
  .card.has-meta::after {
    content: '●';
    position: absolute; top: 8px; right: 8px;
    color: var(--accent);
    font-size: 8px;
    text-shadow: 0 0 8px var(--accent);
  }
  .card img {
    width: 100%; display: block;
    aspect-ratio: auto;
  }
  .card-label {
    padding: 8px 10px;
    font-size: 10px;
    color: var(--text-dim);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    border-top: 1px solid var(--border);
  }
  .card-badge {
    display: inline-block;
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 4px;
    margin-right: 4px;
    font-weight: 500;
  }
  .badge-sd    { background: rgba(124,106,247,.2); color: var(--accent); }
  .badge-comfy { background: rgba(77,208,196,.2);  color: var(--accent3); }
  .badge-mj    { background: rgba(240,98,146,.2);  color: var(--accent2); }
  .badge-nai   { background: rgba(255,200,80,.2);  color: #ffc850; }
  .badge-dalle { background: rgba(80,200,120,.2);  color: #50c878; }
  .badge-other { background: rgba(120,120,160,.2); color: var(--text-dim); }

  /* ─── MODAL ─── */
  #modal {
    display: none;
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,.85);
    backdrop-filter: blur(8px);
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  #modal.open { display: block; }
  .modal-inner {
    min-height: 100dvh;
    padding-bottom: 40px;
    display: flex; flex-direction: column;
  }
  .modal-img-wrap {
    position: relative;
    background: #000;
    display: flex; align-items: center; justify-content: center;
    min-height: 40dvh;
    max-height: 55dvh;
  }
  .modal-img-wrap img {
    max-width: 100%; max-height: 55dvh;
    object-fit: contain;
    display: block;
  }
  .modal-close {
    position: absolute; top: 12px; right: 12px;
    width: 36px; height: 36px;
    background: rgba(0,0,0,.6);
    border: 1px solid var(--border);
    border-radius: 50%;
    color: var(--text);
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(8px);
  }
  .modal-source-badge {
    position: absolute; bottom: 12px; left: 12px;
    padding: 4px 10px; border-radius: 20px;
    font-size: 11px; font-weight: 500;
  }

  .modal-body { padding: 16px; flex: 1; }
  .modal-filename {
    font-family: 'Syne', sans-serif;
    font-size: 15px; font-weight: 700;
    color: var(--text-bright);
    word-break: break-all;
    margin-bottom: 16px;
  }

  /* ─── META SECTIONS ─── */
  .meta-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r);
    margin-bottom: 12px;
    overflow: hidden;
  }
  .meta-header {
    padding: 12px 14px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }
  .meta-title {
    font-family: 'Syne', sans-serif;
    font-size: 12px; font-weight: 700;
    letter-spacing: .5px;
    text-transform: uppercase;
    color: var(--text-dim);
  }
  .meta-title .icon { margin-right: 6px; }
  .copy-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 12px;
    border-radius: 6px;
    border: 1px solid var(--accent);
    background: rgba(124,106,247,.12);
    color: var(--accent);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all .2s;
    white-space: nowrap;
  }
  .copy-btn:active { transform: scale(.94); }
  .copy-btn.copied {
    border-color: var(--success);
    background: rgba(77,208,160,.15);
    color: var(--success);
  }
  .meta-content {
    padding: 14px;
    font-size: 12px;
    line-height: 1.7;
    color: var(--text);
    word-break: break-word;
    white-space: pre-wrap;
  }
  .meta-content.prompt-text {
    font-size: 13px;
    color: #d0d0f0;
  }
  .meta-content.negative {
    color: #f09090;
  }

  /* ─── KV TABLE ─── */
  .kv-table { width: 100%; border-collapse: collapse; }
  .kv-table tr { border-bottom: 1px solid var(--border); }
  .kv-table tr:last-child { border-bottom: none; }
  .kv-table td { padding: 8px 0; vertical-align: top; }
  .kv-table td:first-child {
    color: var(--text-dim);
    font-size: 11px;
    width: 38%;
    padding-right: 10px;
  }
  .kv-table td:last-child {
    color: var(--text);
    font-size: 12px;
    word-break: break-all;
  }

  /* ─── NO META ─── */
  .no-meta {
    text-align: center;
    padding: 30px 20px;
    color: var(--text-dim);
    font-size: 12px;
  }
  .no-meta .icon { font-size: 32px; margin-bottom: 10px; display: block; }

  /* ─── EMPTY STATE ─── */
  #emptyState {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
    display: none;
  }
  #emptyState.visible { display: block; }

  /* ─── TOAST ─── */
  #toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--success);
    color: #0a200a;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 13px;
    padding: 10px 20px;
    border-radius: 20px;
    opacity: 0;
    transition: all .3s;
    pointer-events: none;
    z-index: 999;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ─── SCROLLBAR ─── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}
</script>
<body>

<header>
  <div class="logo">AI<span>meta</span>viewer</div>
  <div class="counter" id="counter">0 images</div>
</header>

<div id="dropzone">
  <div class="drop-icon">🖼️</div>
  <div class="drop-title">画像をドロップ / タップして選択</div>
  <div class="drop-sub">
    <strong>Stable Diffusion · ComfyUI · NovelAI</strong><br>
    <strong>Midjourney · DALL-E · Flux</strong> など対応<br><br>
    PNG / WebP / JPEG（複数選択可）
  </div>
  <div class="btn-upload-wrap">
    <input type="file" id="fileInput" accept="image/*" multiple>
    <div class="btn-upload">📁 ファイルを選択</div>
  </div>
</div>

<div id="toolbar">
  <button class="btn-sm active" id="btnGrid" onclick="setView('grid')">⊞ グリッド</button>
  <button class="btn-sm" id="btnList" onclick="setView('list')">☰ リスト</button>
  <div class="btn-sm btn-add" style="position:relative;overflow:hidden;flex:none;padding:10px 16px;">
    <input type="file" id="fileInputAdd" accept="image/*" multiple style="position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer;font-size:0;z-index:10;">
    <span style="pointer-events:none">＋ 追加</span>
  </div>
  <button class="btn-sm" onclick="clearAll()" title="全削除">🗑</button>
</div>

<div id="emptyState">
  <span style="font-size:40px">🔍</span><br><br>
  メタデータが見つかりません
</div>

<div id="gallery"></div>

<!-- ─── MODAL ─── -->
<div id="modal">
  <div class="modal-inner">
    <div class="modal-img-wrap" id="modalImgWrap">
      <img id="modalImg" src="" alt="">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <span class="modal-source-badge" id="modalBadge"></span>
    </div>
    <div class="modal-body">
      <div class="modal-filename" id="modalFilename"></div>
      <div id="modalMeta"></div>
    </div>
  </div>
</div>

<div id="toast">✓ コピーしました</div>

<script>
// ──────────────────────────────────────────────
//  DATA STORE
// ──────────────────────────────────────────────
let images = [];
let currentView = 'grid';

// ──────────────────────────────────────────────
//  FILE INPUT & DROP
// ──────────────────────────────────────────────
const fileInput = document.getElementById('fileInput');
const dropzone  = document.getElementById('dropzone');

fileInput.addEventListener('change', e => handleFiles(e.target.files));
document.getElementById('fileInputAdd').addEventListener('change', e => handleFiles(e.target.files));

dropzone.addEventListener('dragover',  e => { e.preventDefault(); dropzone.classList.add('drag-over'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
dropzone.addEventListener('drop', e => {
  e.preventDefault();
  dropzone.classList.remove('drag-over');
  handleFiles(e.dataTransfer.files);
});

document.body.addEventListener('dragover',  e => e.preventDefault());
document.body.addEventListener('drop', e => {
  e.preventDefault();
  handleFiles(e.dataTransfer.files);
});

function handleFiles(files) {
  const arr = Array.from(files).filter(f => f.type.startsWith('image/'));
  arr.forEach(f => processFile(f));
}

async function processFile(file) {
  const url  = URL.createObjectURL(file);
  const buf  = await file.arrayBuffer();
  const meta = await extractMeta(file, buf);
  images.push({ file, url, meta });
  renderGallery();
}

// ──────────────────────────────────────────────
//  META EXTRACTION
// ──────────────────────────────────────────────
async function extractMeta(file, buf) {
  const ext = file.name.split('.').pop().toLowerCase();
  let meta = { source: 'unknown', raw: {} };

  if (ext === 'png' || file.type === 'image/png') {
    meta = extractPNG(buf);
  } else if (ext === 'webp' || file.type === 'image/webp') {
    meta = extractWebP(buf);
  } else if (ext === 'jpg' || ext === 'jpeg' || file.type === 'image/jpeg') {
    meta = extractJPEG(buf);
  }
  return meta;
}

// ── PNG ──
function extractPNG(buf) {
  const u8 = new Uint8Array(buf);
  const sig = [137,80,78,71,13,10,26,10];
  for (let i=0;i<8;i++) if (u8[i]!==sig[i]) return { source:'unknown', raw:{} };

  const chunks = [];
  let pos = 8;
  while (pos < u8.length - 4) {
    const len  = (u8[pos]<<24|u8[pos+1]<<16|u8[pos+2]<<8|u8[pos+3])>>>0;
    const type = String.fromCharCode(u8[pos+4],u8[pos+5],u8[pos+6],u8[pos+7]);
    const data = u8.slice(pos+8, pos+8+len);
    chunks.push({ type, data, len });
    pos += 12 + len;
    if (type === 'IEND') break;
  }

  const raw = {};
  const texts = {};

  for (const ch of chunks) {
    if (ch.type === 'tEXt') {
      const nullIdx = ch.data.indexOf(0);
      if (nullIdx !== -1) {
        const k = dec(ch.data.slice(0, nullIdx));
        const v = dec(ch.data.slice(nullIdx+1));
        texts[k] = v;
        raw[k] = v;
      }
    } else if (ch.type === 'iTXt') {
      try {
        let i2 = ch.data.indexOf(0);
        const k = dec(ch.data.slice(0, i2));
        i2++;
        const compressed = ch.data[i2++];
        i2++; // compression method
        // skip lang tag
        let i3 = ch.data.indexOf(0, i2); i3++;
        // skip translated key
        let i4 = ch.data.indexOf(0, i3); i4++;
        let v;
        if (compressed) {
          // try decompress (skip if unavailable)
          v = '[compressed iTXt]';
        } else {
          v = decUtf8(ch.data.slice(i4));
        }
        texts[k] = v;
        raw[k] = v;
      } catch(e){}
    }
  }

  return detectSource(texts, raw);
}

// ── WebP ──
function extractWebP(buf) {
  const u8 = new Uint8Array(buf);
  // WebP: RIFF????WEBP
  if (dec(u8.slice(0,4)) !== 'RIFF' || dec(u8.slice(8,12)) !== 'WEBP') return { source:'unknown', raw:{} };

  let pos = 12;
  const texts = {};
  const raw = {};

  while (pos < u8.length - 8) {
    const chunkId = dec(u8.slice(pos, pos+4));
    const size = u8[pos+4]|(u8[pos+5]<<8)|(u8[pos+6]<<16)|(u8[pos+7]<<24);
    const data = u8.slice(pos+8, pos+8+size);

    if (chunkId === 'EXIF') {
      const exif = parseEXIF(data);
      Object.assign(raw, exif);
      Object.assign(texts, exif);
    } else if (chunkId === 'XMP ') {
      const xmp = decUtf8(data);
      raw['XMP'] = xmp;
      const mj = xmp.match(/<dc:description[^>]*>([\s\S]*?)<\/dc:description>/i);
      if (mj) texts['Description'] = mj[1].replace(/<[^>]+>/g,'').trim();
    }
    pos += 8 + size + (size & 1);
    if (pos <= 12) break;
  }
  return detectSource(texts, raw);
}

// ── JPEG ──
function extractJPEG(buf) {
  const u8 = new Uint8Array(buf);
  if (u8[0]!==0xFF || u8[1]!==0xD8) return { source:'unknown', raw:{} };

  const texts = {};
  const raw = {};
  let pos = 2;

  while (pos < u8.length - 2) {
    if (u8[pos] !== 0xFF) break;
    const marker = u8[pos+1];
    if (marker === 0xD9 || marker === 0xDA) break;
    const len = (u8[pos+2]<<8|u8[pos+3]);
    const data = u8.slice(pos+4, pos+2+len);

    if (marker === 0xE1) { // APP1 = EXIF or XMP
      const hdr = dec(data.slice(0,6));
      if (hdr.startsWith('Exif')) {
        const exif = parseEXIF(data.slice(6));
        Object.assign(raw, exif); Object.assign(texts, exif);
      } else {
        const xmpStr = decUtf8(data);
        if (xmpStr.includes('<x:xmpmeta') || xmpStr.includes('xpacket')) {
          raw['XMP'] = xmpStr;
          const mj = xmpStr.match(/dc:description[^>]*>([\s\S]*?)<\/dc:description>/i);
          if (mj) texts['Description'] = mj[1].replace(/<[^>]+>/g,'').trim();
        }
      }
    }
    pos += 2 + len;
  }
  return detectSource(texts, raw);
}

// ── EXIF parser (minimal) ──
function parseEXIF(data) {
  const result = {};
  try {
    if (data.length < 8) return result;
    const hdr = String.fromCharCode(data[0],data[1]);
    const le = hdr === 'II';
    const read16 = (o) => le ? (data[o]|data[o+1]<<8) : (data[o]<<8|data[o+1]);
    const read32 = (o) => le ? (data[o]|data[o+1]<<8|data[o+2]<<16|data[o+3]<<24)>>>0
                              : (data[o]<<24|data[o+1]<<16|data[o+2]<<8|data[o+3])>>>0;
    if (read16(2) !== 42) return result;
    let ifdOff = read32(4);
    if (ifdOff + 2 > data.length) return result;
    const entries = read16(ifdOff); ifdOff += 2;
    for (let i=0; i<entries; i++) {
      const base = ifdOff + i*12;
      if (base + 12 > data.length) break;
      const tag  = read16(base);
      const type = read16(base+2);
      const count= read32(base+4);
      const valOff = base+8;
      // UserComment(0x9286), ImageDescription(0x010E), Make(0x010F), Model(0x0110)
      if (tag === 0x9286 || tag === 0x010E || tag === 0x010F || tag === 0x0110) {
        let off = read32(valOff);
        if (type===2) { // ASCII
          const bytes = data.slice(off, off+count);
          result[tagName(tag)] = dec(bytes).replace(/\0/g,'').trim();
        } else if (tag === 0x9286) { // UserComment
          const bytes = data.slice(off, off+count);
          const cs = dec(bytes.slice(0,8)).trim();
          if (cs.startsWith('UNICODE')) result['UserComment'] = decUtf16(bytes.slice(8), le);
          else result['UserComment'] = dec(bytes.slice(8)).replace(/\0/g,'').trim();
        }
      }
    }
  } catch(e){}
  return result;
}
function tagName(t) {
  return {0x010E:'ImageDescription',0x010F:'Make',0x0110:'Model',0x9286:'UserComment'}[t]||('0x'+t.toString(16));
}

// ── SOURCE DETECTOR ──
function detectSource(texts, raw) {
  const str = JSON.stringify(texts).toLowerCase();
  let source = 'other';
  let prompt = '', negative = '', params = {}, workflow = null;

  // ── ComfyUI ──
  if (texts['prompt'] && texts['workflow']) {
    source = 'comfy';
    try {
      const wf = JSON.parse(texts['workflow']);
      workflow = texts['workflow'];
      // Extract prompts from ComfyUI nodes
      const nodes = Object.values(wf);
      for (const node of nodes) {
        if (!node.inputs) continue;
        if (node.class_type === 'CLIPTextEncode' || node.class_type === 'Text Multiline') {
          if (node.inputs.text && typeof node.inputs.text === 'string') {
            if (!prompt) prompt = node.inputs.text;
          }
        }
        if (node.class_type === 'KSampler' || node.class_type === 'KSamplerAdvanced') {
          if (node.inputs.seed != null)    params['Seed']    = node.inputs.seed;
          if (node.inputs.steps != null)   params['Steps']   = node.inputs.steps;
          if (node.inputs.cfg != null)     params['CFG']     = node.inputs.cfg;
          if (node.inputs.sampler_name)    params['Sampler'] = node.inputs.sampler_name;
          if (node.inputs.scheduler)       params['Scheduler']= node.inputs.scheduler;
          if (node.inputs.denoise != null) params['Denoise'] = node.inputs.denoise;
        }
        if (node.class_type === 'CheckpointLoaderSimple') {
          if (node.inputs.ckpt_name) params['Checkpoint'] = node.inputs.ckpt_name;
        }
        if (node.class_type === 'EmptyLatentImage' || node.class_type === 'EmptySD3LatentImage') {
          if (node.inputs.width)  params['Width']  = node.inputs.width;
          if (node.inputs.height) params['Height'] = node.inputs.height;
        }
      }
    } catch(e){}
  }

  // ── Stable Diffusion (A1111 / AUTOMATIC1111) ──
  else if (texts['parameters']) {
    source = 'sd';
    const p = texts['parameters'];
    const negIdx = p.indexOf('Negative prompt:');
    const stepIdx = p.search(/\nSteps:/);
    if (negIdx !== -1) {
      prompt   = p.slice(0, negIdx).trim();
      negative = stepIdx !== -1 ? p.slice(negIdx+16, stepIdx).trim() : p.slice(negIdx+16).trim();
    } else if (stepIdx !== -1) {
      prompt = p.slice(0, stepIdx).trim();
    } else {
      prompt = p.trim();
    }
    // Parse param line
    const paramLine = stepIdx !== -1 ? p.slice(stepIdx+1) : '';
    paramLine.split(',').forEach(pair => {
      const [k,...vs] = pair.split(':');
      if (k && vs.length) params[k.trim()] = vs.join(':').trim();
    });
  }

  // ── NovelAI ──
  else if (texts['Software'] === 'NovelAI' || str.includes('novelai') || texts['Source'] === 'Stable Diffusion XL') {
    source = 'nai';
    prompt   = texts['Description'] || texts['prompt'] || '';
    negative = texts['Comment'] ? (() => {
      try { const j=JSON.parse(texts['Comment']); return j.uc||j.negative||''; } catch(e){ return ''; }
    })() : '';
    if (texts['Comment']) {
      try {
        const j = JSON.parse(texts['Comment']);
        ['steps','sampler','seed','scale','strength','noise','sm','sm_dyn','cfg_rescale','noise_schedule'].forEach(k => {
          if (j[k] != null) params[k[0].toUpperCase()+k.slice(1)] = j[k];
        });
      } catch(e){}
    }
  }

  // ── Midjourney (usually in description/EXIF) ──
  else if (str.includes('midjourney') || str.includes('--ar ') || str.includes('--v ') || str.includes('--style')) {
    source = 'mj';
    prompt = texts['Description'] || texts['UserComment'] || texts['ImageDescription'] || '';
    const arM = prompt.match(/--ar\s+(\S+)/); if(arM) params['Aspect Ratio'] = arM[1];
    const vM  = prompt.match(/--v\s+(\S+)/);  if(vM)  params['Version'] = vM[1];
    const sM  = prompt.match(/--style\s+(\S+)/); if(sM) params['Style'] = sM[1];
    const qM  = prompt.match(/--q\s+(\S+)/);  if(qM)  params['Quality'] = qM[1];
  }

  // ── DALL-E / OpenAI ──
  else if (str.includes('openai') || str.includes('dall-e') || str.includes('dalle')) {
    source = 'dalle';
    prompt = texts['Description'] || texts['UserComment'] || '';
  }

  // ── Generic fallback ──
  else {
    prompt = texts['Description'] || texts['UserComment'] || texts['ImageDescription'] ||
             texts['prompt'] || texts['Prompt'] || '';
    if (texts['parameters']) { source = 'sd'; }
    if (prompt) source = 'other';
  }

  return { source, prompt: prompt.trim(), negative: negative.trim(), params, workflow, raw };
}

// ──────────────────────────────────────────────
//  RENDER
// ──────────────────────────────────────────────
function renderGallery() {
  const gallery = document.getElementById('gallery');
  const toolbar = document.getElementById('toolbar');
  const dz      = document.getElementById('dropzone');
  const counter = document.getElementById('counter');

  counter.textContent = images.length + ' images';

  if (images.length === 0) {
    dz.classList.remove('hidden');
    toolbar.classList.remove('visible');
    gallery.innerHTML = '';
    return;
  }
  dz.classList.add('hidden');
  toolbar.classList.add('visible');

  gallery.innerHTML = '';
  images.forEach((img, idx) => {
    const hasMeta = !!(img.meta.prompt || img.meta.negative || Object.keys(img.meta.params).length || Object.keys(img.meta.raw).length);
    const card = document.createElement('div');
    card.className = 'card' + (hasMeta ? ' has-meta' : '');
    card.onclick = () => openModal(idx);

    const im = document.createElement('img');
    im.src = img.url;
    im.loading = 'lazy';
    card.appendChild(im);

    const lbl = document.createElement('div');
    lbl.className = 'card-label';
    const badge = document.createElement('span');
    badge.className = 'card-badge ' + badgeClass(img.meta.source);
    badge.textContent = sourceName(img.meta.source);
    lbl.appendChild(badge);
    lbl.appendChild(document.createTextNode(img.file.name));
    card.appendChild(lbl);

    gallery.appendChild(card);
  });
}

function badgeClass(s) {
  return { sd:'badge-sd', comfy:'badge-comfy', mj:'badge-mj', nai:'badge-nai', dalle:'badge-dalle' }[s] || 'badge-other';
}
function sourceName(s) {
  return { sd:'A1111', comfy:'ComfyUI', mj:'MJ', nai:'NAI', dalle:'DALL-E', other:'Other', unknown:'?' }[s] || s;
}

// ──────────────────────────────────────────────
//  MODAL
// ──────────────────────────────────────────────
function openModal(idx) {
  const img  = images[idx];
  const meta = img.meta;

  document.getElementById('modalImg').src = img.url;
  document.getElementById('modalFilename').textContent = img.file.name;

  const badge = document.getElementById('modalBadge');
  badge.textContent = sourceName(meta.source);
  badge.className = 'modal-source-badge card-badge ' + badgeClass(meta.source);

  const container = document.getElementById('modalMeta');
  container.innerHTML = '';

  const hasAnything = meta.prompt || meta.negative || Object.keys(meta.params).length || Object.keys(meta.raw).length;

  if (!hasAnything) {
    container.innerHTML = `<div class="no-meta"><span class="icon">🔍</span>メタデータが見つかりませんでした<br><small style="color:var(--text-dim)">JPEG・一部のWebPはメタデータを<br>持たない場合があります</small></div>`;
  }

  // ── Prompt ──
  if (meta.prompt) {
    container.appendChild(makeSection('✏️ プロンプト', meta.prompt, 'prompt-text', true));
  }

  // ── Negative ──
  if (meta.negative) {
    container.appendChild(makeSection('🚫 ネガティブプロンプト', meta.negative, 'negative', true));
  }

  // ── Parameters ──
  if (Object.keys(meta.params).length) {
    container.appendChild(makeKVSection('⚙️ パラメーター', meta.params));
  }

  // ── Raw all keys ──
  const extraRaw = {};
  Object.entries(meta.raw).forEach(([k,v]) => {
    if (k !== 'parameters' && k !== 'workflow') extraRaw[k] = v;
  });
  if (Object.keys(extraRaw).length && !meta.prompt && !Object.keys(meta.params).length) {
    container.appendChild(makeKVSection('📦 生データ', extraRaw));
  }

  // ── Workflow JSON ──
  if (meta.workflow) {
    const sec = makeSection('🔀 ComfyUI Workflow JSON', meta.workflow, '', true);
    container.appendChild(sec);
  }

  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function makeSection(title, content, cls, copyable) {
  const sec = document.createElement('div');
  sec.className = 'meta-section';
  const hdr = document.createElement('div');
  hdr.className = 'meta-header';
  const t = document.createElement('div');
  t.className = 'meta-title';
  t.innerHTML = title;
  hdr.appendChild(t);
  if (copyable) {
    const btn = document.createElement('button');
    btn.className = 'copy-btn';
    btn.innerHTML = '📋 コピー';
    btn.onclick = () => copyText(content, btn);
    hdr.appendChild(btn);
  }
  sec.appendChild(hdr);
  const body = document.createElement('div');
  body.className = 'meta-content ' + cls;
  body.textContent = content;
  sec.appendChild(body);
  return sec;
}

function makeKVSection(title, kvObj) {
  const sec = document.createElement('div');
  sec.className = 'meta-section';
  const hdr = document.createElement('div');
  hdr.className = 'meta-header';
  const t = document.createElement('div');
  t.className = 'meta-title';
  t.innerHTML = title;
  hdr.appendChild(t);
  const btn = document.createElement('button');
  btn.className = 'copy-btn';
  btn.innerHTML = '📋 コピー';
  const allText = Object.entries(kvObj).map(([k,v])=>`${k}: ${v}`).join('\n');
  btn.onclick = () => copyText(allText, btn);
  hdr.appendChild(btn);
  sec.appendChild(hdr);
  const body = document.createElement('div');
  body.className = 'meta-content';
  const table = document.createElement('table');
  table.className = 'kv-table';
  Object.entries(kvObj).forEach(([k,v]) => {
    const tr = document.createElement('tr');
    const td1 = document.createElement('td'); td1.textContent = k;
    const td2 = document.createElement('td'); td2.textContent = String(v).length > 400 ? String(v).slice(0,400)+'…' : String(v);
    tr.appendChild(td1); tr.appendChild(td2);
    table.appendChild(tr);
  });
  body.appendChild(table);
  sec.appendChild(body);
  return sec;
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
}

// close on background tap
document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});

//

// ESCキーでモーダルを閉じる処理を追加
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' || e.keyCode === 27) {
    if (document.getElementById('modal').classList.contains('open')) {
      closeModal();
    }
  }
});

//
 ──────────────────────────────────────────────
//  COPY
// ──────────────────────────────────────────────
function copyText(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    if (btn) {
      btn.classList.add('copied');
      btn.innerHTML = '✓ コピー済み';
      setTimeout(() => { btn.classList.remove('copied'); btn.innerHTML = '📋 コピー'; }, 2000);
    }
    showToast();
  }).catch(() => {
    // fallback
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    if (btn) { btn.classList.add('copied'); btn.innerHTML = '✓ コピー済み'; setTimeout(()=>{btn.classList.remove('copied');btn.innerHTML='📋 コピー';},2000); }
    showToast();
  });
}

function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

// ──────────────────────────────────────────────
//  VIEW TOGGLE
// ──────────────────────────────────────────────
function setView(v) {
  currentView = v;
  document.getElementById('gallery').classList.toggle('list-view', v === 'list');
  document.getElementById('btnGrid').classList.toggle('active', v === 'grid');
  document.getElementById('btnList').classList.toggle('active', v === 'list');
}

function clearAll() {
  if (!confirm('すべての画像を削除しますか？')) return;
  images.forEach(img => URL.revokeObjectURL(img.url));
  images = [];
  renderGallery();
  document.getElementById('dropzone').classList.remove('hidden');
  document.getElementById('toolbar').classList.remove('visible');
  document.getElementById('counter').textContent = '0 images';
}

// ──────────────────────────────────────────────
//  UTILS
// ──────────────────────────────────────────────
function dec(arr) {
  return String.fromCharCode(...arr);
}
function decUtf8(arr) {
  return new TextDecoder('utf-8').decode(arr instanceof Uint8Array ? arr : new Uint8Array(arr));
}
function decUtf16(arr, le) {
  return new TextDecoder(le ? 'utf-16le' : 'utf-16be').decode(arr instanceof Uint8Array ? arr : new Uint8Array(arr));
}
